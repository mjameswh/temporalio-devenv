# Metadata for all repositories in all-in-one/
#
# upstream_branch: the branch name on origin that represents the upstream main.
#                  Omit when origin uses "main". The local branch is always "main".
# setup:           Shell command run from within the repo after each sync, to keep
#                  the project in a state suitable for IDE navigation (deps, codegen...).
#                  Omit when no such step is needed.

# --- temporalio -----------------------------------------------------------------

[repos.documentation]
repository = "temporalio/documentation"

[repos.documentation-snipsync]
repository = "temporalio/snipsync"
setup = "pnpm install"

[repos.features]
repository = "temporalio/features"
setup = "go mod download"

[repos.homebrew-brew]
repository = "temporalio/homebrew-brew"

[repos.omes]
repository = "temporalio/omes"
setup = "go mod download"

[repos.proposals]
repository = "temporalio/proposals"
upstream_branch = "master"

[repos.s2s-proxy]
repository = "temporalio/s2s-proxy"
setup = "go mod download"

[repos.setup-temporal]
repository = "temporalio/setup-temporal"

[repos.temporal-api]
repository = "temporalio/api"
upstream_branch = "master"

[repos.temporal-api-cloud]
repository = "temporalio/api-cloud"

[repos.temporal-api-go]
repository = "temporalio/api-go"
upstream_branch = "master"
setup = "go mod download"

[repos.temporal-cli]
repository = "temporalio/cli"
setup = "go mod download"

[repos.temporal-sdk-rust]
repository = "temporalio/sdk-rust"
setup = "cargo fetch"

[repos.temporal-sdk-dotnet]
repository = "temporalio/sdk-dotnet"
setup = "dotnet restore"

[repos.temporal-sdk-dotnet-samples]
repository = "temporalio/samples-dotnet"
setup = "dotnet restore"

[repos.temporal-sdk-go]
repository = "temporalio/sdk-go"
setup = "go mod download"

[repos.temporal-sdk-go-samples]
repository = "temporalio/samples-go"
setup = "go mod download"

[repos.temporal-sdk-java]
repository = "temporalio/sdk-java"
upstream_branch = "master"
setup = "./gradlew dependencies --quiet"

[repos.temporal-sdk-java-samples]
repository = "temporalio/samples-java"
setup = "./gradlew dependencies --quiet"

[repos.temporal-sdk-php]
repository = "temporalio/sdk-php"
upstream_branch = "master"

[repos.temporal-sdk-php-roadrunner]
repository = "temporalio/roadrunner-temporal"
upstream_branch = "master"

[repos.temporal-sdk-php-samples]
repository = "temporalio/samples-php"
upstream_branch = "master"

[repos.temporal-sdk-python]
repository = "temporalio/sdk-python"
setup = "uv sync"

[repos.temporal-sdk-python-samples]
repository = "temporalio/samples-python"
setup = "uv sync"

[repos.temporal-sdk-ruby]
repository = "temporalio/sdk-ruby"
# setup = "bundle install --quiet"

[repos.temporal-sdk-ruby-samples]
repository = "temporalio/samples-ruby"
# Seems like this one is not working at the moment
# setup = "bundle install --quiet"

[repos.temporal-sdk-typescript]
repository = "temporalio/sdk-typescript"
setup = "pnpm install"

[repos.temporal-sdk-typescript-samples]
repository = "temporalio/samples-typescript"
setup = "pnpm install"

[repos.temporal-server]
repository = "temporalio/temporal"
setup = "go mod download"

[repos.ui]
repository = "temporalio/ui"
setup = "pnpm install"

[repos.ui-server]
repository = "temporalio/ui-server"
setup = "go mod download"

[repos.vscode-debugger-extension]
repository = "temporalio/vscode-debugger-extension"
setup = "npm install"


